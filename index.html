<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Paraphraser | Rewrite Text</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 5px;
            font-size:15px;
            margin:12px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Free AI Paraphraser | Rewrite Text</h2>
    <p style="color:#666;margin-top:-8px">Free daily uses, no login needed</p>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>
    <button id="btn">Paraphrase</button>
    <textarea id="outputText" readonly placeholder="Result will show here..."></textarea>

    <p style="text-align:center;margin-top:30px;color:#666">Get unlimited access & stable API Keys, contact me.</p>

    <script>
        const inputBox = document.getElementById("inputText");
        const outputBox = document.getElementById("outputText");
        const btn = document.getElementById("btn");

        btn.addEventListener("click", async () => {
            const inputVal = inputBox.value.trim();
            if (!inputVal) return;

            outputBox.value = "Processing...";

            try {
                //Netlify 正确接口地址
                const res = await fetch("/.netlify/functions/proxy", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ prompt: inputVal })
                });

                //先拿纯文本，再手动解析JSON，规避pattern报错
                const rawText = await res.text();
                const data = JSON.parse(rawText);

                if (data.error) {
                    outputBox.value = "Network Fail: " + data.error;
                } else {
                    outputBox.value = data.choices[0].message.content;
                }
            } catch (err) {
                outputBox.value = "Network Fail: " + err.message;
            }
        })
    </script>
</body>
</html>
